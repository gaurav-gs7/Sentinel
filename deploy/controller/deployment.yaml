apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-controller
  namespace: sentinel-system
  labels:
    app.kubernetes.io/name: sentinel-controller
    app.kubernetes.io/managed-by: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-controller
        app.kubernetes.io/managed-by: sentinel
    spec:
      serviceAccountName: sentinel-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/example/sentinel-controller:latest
          imagePullPolicy: IfNotPresent
          args:
            - --resync=30s
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
