services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - sentinel-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      SENTINEL_ADDR: ":8080"
      DATABASE_URL: "postgres://sentinel:sentinel@postgres:5432/sentinel?sslmode=disable"
      SENTINEL_TEMPLATE_DIR: "/app/templates"
      SENTINEL_OUTPUT_DIR: "/app/generated/services"
      SENTINEL_API_TOKEN: "local-dev-token"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sentinel-generated:/app/generated

volumes:
  sentinel-postgres:
  sentinel-generated:
